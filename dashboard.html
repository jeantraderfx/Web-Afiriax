<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - AfriaxCapital</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .mensaje { padding: 20px; background: #fff3cd; border: 1px solid #ffeeba; border-radius: 5px; }
        .aprobado { padding: 20px; background: #d4edda; border: 1px solid #c3e6cb; border-radius: 5px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRfSSfxaNcZ3YIhttSJb0W8V9hu-JGur8",
            authDomain: "afriaxcapital-f4c63.firebaseapp.com",
            projectId: "afriaxcapital-f4c63",
            storageBucket: "afriaxcapital-f4c63.firebasestorage.app",
            messagingSenderId: "661164998506",
            appId: "1:661164998506:web:d357357f57110ab43b2f13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "registro.html"; return; }
            
            const docRef = doc(db, "usuarios", user.uid);
            const docSnap = await getDoc(docRef);
            const panel = document.getElementById('panel');

            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.estado === "pendiente") {
                    panel.innerHTML = `<div class="mensaje">Hola ${data.nombre}, tu registro está siendo evaluado manualmente. Vuelve pronto.</div>`;
                } else {
                    renderAprobado(user.uid, data.ids_trading || []);
                }
            }
        });

        function renderAprobado(uid, ids) {
            let html = `<div class="aprobado"><h3>¡Cuenta Aprobada!</h3>`;
            html += `<p>IDs vinculados: ${ids.length}/2</p><ul>`;
            ids.forEach(id => html += `<li>${id}</li>`);
            html += `</ul>`;

            if(ids.length < 2) {
                html += `<input type="number" id="idMeta" placeholder="ID de cuenta Trading">
                        <button onclick="vincular('${uid}')">Vincular ID</button>`;
            } else {
                html += `<p><strong>Límite alcanzado.</strong> Contacta al admin para resetear.</p>`;
            }
            
            // Aquí podrías poner el link al bot cuando lo tengas listo
            html += `<hr><p>Si ya vinculaste tus IDs, contacta por Telegram para recibir tu bot hardcodeado.</p></div>`;
            document.getElementById('panel').innerHTML = html;
        }

        window.vincular = async (uid) => {
            const val = document.getElementById('idMeta').value;
            if(!val) return;
            await updateDoc(doc(db, "usuarios", uid), { ids_trading: arrayUnion(val) });
            location.reload();
        }

        window.logout = () => signOut(auth);
    </script>
</head>
<body>
    <h1>AfriaxCapital Dashboard</h1>
    <div id="panel">Cargando datos...</div>
    <br><button onclick="logout()">Cerrar Sesión</button>
</body>
</html>
