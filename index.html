<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfiriaxCapital | Bots para Nasdaq y Oro</title>
    <style>
        :root { --verde: #76ff03; --fondo: #0a0a0a; --tarjeta: #1a1a1a; }
        body { font-family: sans-serif; margin: 0; background: var(--fondo); color: white; text-align: center; }
        nav { padding: 20px; border-bottom: 1px solid #333; font-weight: bold; font-size: 1.2rem; }
        span { color: var(--verde); }
        .hero { padding: 100px 20px; background: radial-gradient(circle, #1a3311 0%, #0a0a0a 70%); }
        h1 { font-size: 3rem; text-transform: uppercase; }
        .btn { display: inline-block; padding: 15px 30px; background: var(--verde); color: black; 
               text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 50px 10%; }
        .card { background: var(--tarjeta); padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .card h3 { color: var(--verde); }
    </style>
</head>
<body>
    <nav>AFIRIAX<span>CAPITAL</span></nav>
    <header class="hero">
        <h1>Dominando <span>Nasdaq & Oro</span></h1>
        <p>Bots de alta precisión para MT5, TradingView y cTrader.</p>
        <a href="#" class="btn">SOLICITAR ACCESO</a>
    </header>
    <section class="grid">
        <div class="card"><h3>MetaTrader 5</h3><p>EAs para Nasdaq.</p></div>
        <div class="card"><h3>TradingView</h3><p>Alertas para Oro.</p></div>
        <div class="card"><h3>cTrader</h3><p>cBots profesionales.</p></div>
    </section>
</body>
</html>
