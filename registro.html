<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Cliente | AfriaxCapital</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #76ff03; --fondo: #040404; --tarjeta: #0c0c0c; --borde: #1e1e1e; --texto: #f0f0f0; }
        body { font-family: 'Syne', sans-serif; background: var(--fondo); color: var(--texto); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-card { background: var(--tarjeta); border: 1px solid var(--borde); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 1.5rem; font-weight: 900; margin-bottom: 30px; }
        .logo span { color: var(--verde); }
        h2 { margin-bottom: 20px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #141414; border: 1px solid var(--borde); color: #fff; border-radius: 5px; font-family: 'Space Mono', monospace; }
        input:focus { border-color: var(--verde); outline: none; }
        button { width: 100%; padding: 14px; background: var(--verde); color: #000; border: none; border-radius: 5px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #fff; transform: translateY(-2px); }
        .toggle-link { margin-top: 20px; font-size: 0.8rem; color: #888; cursor: pointer; }
        .toggle-link span { color: var(--verde); text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">Afriax<span>Capital</span></div>
        <h2 id="auth-title">Iniciar Sesión</h2>
        <input type="email" id="email" placeholder="Correo Electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="auth-btn" onclick="ejecutarAuth()">Entrar al Terminal</button>
        <div class="toggle-link" onclick="toggleAuth()">
            <p id="toggle-text">¿No tienes cuenta? <span>Regístrate aquí</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRfsSfxaNcZ3YIhttSJb0W8V9hu-JGur8",
            authDomain: "afiriaxcapital-f4c63.firebaseapp.com",
            projectId: "afiriaxcapital-f4c63",
            storageBucket: "afiriaxcapital-f4c63.firebasestorage.app",
            messagingSenderId: "661164998506",
            appId: "1:661164998506:web:d357357f57110ab43b2f13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let esRegistro = false;

        window.toggleAuth = () => {
            esRegistro = !esRegistro;
            document.getElementById('auth-title').innerText = esRegistro ? "Crear Cuenta" : "Iniciar Sesión";
            document.getElementById('auth-btn').innerText = esRegistro ? "Registrarse" : "Entrar al Terminal";
            document.getElementById('toggle-text').innerHTML = esRegistro ? "¿Ya tienes cuenta? <span>Inicia sesión</span>" : "¿No tienes cuenta? <span>Regístrate aquí</span>";
        };

        window.ejecutarAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            try {
                if (esRegistro) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    // IMPORTANTE: Crea el permiso como pendiente
                    await setDoc(doc(db, "usuarios", res.user.uid), {
                        email: email,
                        estado: "pendiente",
                        fecha: new Date().toISOString()
                    });
                    alert("Registro recibido. Revisaremos tu pago manualmente.");
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
                window.location.href = "dashboard.html";
            } catch (error) {
                alert("Error: " + error.message);
            }
        };
    </script>
</body>
</html>
