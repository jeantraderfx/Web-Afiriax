<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal | AfriaxCapital</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #76ff03; --fondo: #040404; --tarjeta: #0c0c0c; --borde: #1e1e1e; --texto: #f0f0f0; }
        body { font-family: 'Syne', sans-serif; background: var(--fondo); color: var(--texto); margin: 0; }
        
        /* Estilos Sala de Espera */
        #bloqueo {
            position: fixed; inset: 0; background: var(--fondo);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; z-index: 9999;
        }
        .status-icon { font-size: 4rem; color: var(--verde); margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        /* Estilos Dashboard Real */
        nav { padding: 20px 5%; border-bottom: 1px solid var(--borde); display: flex; justify-content: space-between; align-items: center; }
        .logo span { color: var(--verde); font-weight: 900; }
        .content { padding: 40px 5%; max-width: 1200px; margin: 0 auto; display: none; }
        .stat-card { background: var(--tarjeta); border: 1px solid var(--borde); padding: 25px; border-radius: 8px; }
        .btn-out { padding: 8px 16px; border: 1px solid #ff3b3b; color: #ff3b3b; background: transparent; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="bloqueo">
        <div class="status-icon">⏳</div>
        <h1>CUENTA BAJO EVALUACIÓN</h1>
        <p style="color: #888; max-width: 450px;">Hola <span id="waitEmail" style="color: var(--verde);"></span>. Estamos verificando tu suscripción manualmente. Este proceso suele tardar de 1 a 6 horas.</p>
        <button onclick="cerrarSesion()" style="margin-top: 20px; color: #555; background: none; border: none; cursor: pointer; text-decoration: underline;">Cerrar Sesión</button>
    </div>

    <div id="dashboard-content">
        <nav>
            <div class="logo">Afriax<span>Capital</span></div>
            <button class="btn-out" onclick="cerrarSesion()">Desconectar</button>
        </nav>
        <div class="content" id="main-ui">
            <h1>Bienvenido al Terminal VIP</h1>
            <p>Acceso verificado para: <span id="userEmail" style="color: var(--verde);"></span></p>
            <div style="margin-top: 30px;" class="stat-card">
                <h3>SISTEMA ALGORÍTMICO</h3>
                <p style="color: var(--verde); font-family: 'Space Mono';">ESTADO: OPERATIVO / CONECTADO</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRfsSfxaNcZ3YIhttSJb0W8V9hu-JGur8",
            authDomain: "afiriaxcapital-f4c63.firebaseapp.com",
            projectId: "afiriaxcapital-f4c63",
            storageBucket: "afiriaxcapital-f4c63.firebasestorage.app",
            messagingSenderId: "661164998506",
            appId: "1:661164998506:web:d357357f57110ab43b2f13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Consultar el estado en la base de datos
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists() && docSnap.data().estado === "aprobado") {
                    // MOSTRAR DASHBOARD
                    document.getElementById('main-ui').style.display = 'block';
                    document.getElementById('bloqueo').style.display = 'none';
                    document.getElementById('userEmail').innerText = user.email;
                } else {
                    // MOSTRAR ESPERA
                    document.getElementById('bloqueo').style.display = 'flex';
                    document.getElementById('main-ui').style.display = 'none';
                    document.getElementById('waitEmail').innerText = user.email;
                }
            } else {
                window.location.href = "registro.html";
            }
        });

        window.cerrarSesion = () => signOut(auth).then(() => window.location.href = "registro.html");
    </script>
</body>
</html>
