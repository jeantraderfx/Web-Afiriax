<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AfriaxCapital</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #76ff03; --fondo: #040404; --tarjeta: #0c0c0c; --borde: #1e1e1e; --texto: #f0f0f0; }
        body { font-family: 'Syne', sans-serif; background: var(--fondo); color: var(--texto); margin: 0; }
        nav { padding: 20px 5%; border-bottom: 1px solid var(--borde); display: flex; justify-content: space-between; align-items: center; }
        .logo span { color: var(--verde); font-weight: 900; }
        .content { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .welcome-box { background: var(--tarjeta); border: 1px solid var(--borde); padding: 30px; border-radius: 12px; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .stat-card { background: #0f0f0f; border: 1px solid var(--borde); padding: 25px; border-radius: 8px; }
        .stat-card h3 { color: #888; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card p { font-family: 'Space Mono', monospace; font-size: 1.5rem; color: var(--verde); }
        .btn-out { padding: 8px 16px; border: 1px solid #ff3b3b; color: #ff3b3b; background: transparent; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-out:hover { background: #ff3b3b; color: #000; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Afriax<span>Capital</span></div>
        <button class="btn-out" onclick="cerrarSesion()">Desconectar</button>
    </nav>

    <div class="content">
        <div class="welcome-box">
            <h1 style="font-size: 1.5rem;">BIENVENIDO AL TERMINAL</h1>
            <p style="color: #888; font-size: 0.9rem; margin-top: 10px;">Usuario activo: <span id="userEmail" style="color: var(--verde);">Cargando...</span></p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Estado del Bot</h3>
                <p>ACTIVO</p>
            </div>
            <div class="stat-card">
                <h3>Instrumento</h3>
                <p>NASDAQ / ORO</p>
            </div>
            <div class="stat-card">
                <h3>Balance de Cuenta</h3>
                <p>$0.00</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRfsSfxaNcZ3YIhttSJb0W8V9hu-JGur8",
            authDomain: "afiriaxcapital-f4c63.firebaseapp.com",
            projectId: "afiriaxcapital-f4c63",
            storageBucket: "afiriaxcapital-f4c63.firebasestorage.app",
            messagingSenderId: "661164998506",
            appId: "1:661164998506:web:d357357f57110ab43b2f13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Seguridad: Si no hay usuario, regresa al registro
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
            } else {
                window.location.href = "registro.html";
            }
        });

        window.cerrarSesion = () => {
            signOut(auth).then(() => {
                window.location.href = "registro.html";
            });
        };
    </script>
</body>
</html>
